name: Aplicar migraciones a Supabase

# Cada vez que una migración nueva llega a main (al mergear un PR), esta acción
# la aplica sola a la base de datos de producción con `supabase db push`.
# Cero SQL Editor, cero copiar-pegar. `db push` solo aplica migraciones
# PENDIENTES, hacia adelante — nunca reescribe ni borra lo ya aplicado.
#
# Requisitos (se configuran UNA sola vez en GitHub → Settings → Secrets and
# variables → Actions → New repository secret). Nunca van en el código ni en chat:
#   · SUPABASE_ACCESS_TOKEN   → un PAT de Supabase (Account → Access Tokens)
#   · SUPABASE_PROJECT_REF    → el ref del proyecto (Project Settings → General)
#   · SUPABASE_DB_PASSWORD    → la contraseña de la base (Project Settings → Database)
#
# También se puede disparar a mano desde la pestaña Actions (workflow_dispatch).

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {}

# Evita dos despliegues de migración al mismo tiempo.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  db-push:
    runs-on: ubuntu-latest
    # Si faltan los secretos, el job no corre (no falla ruidosamente en repos sin configurar).
    if: ${{ github.repository == 'jmdesignsworldwide-beep/dental-demo-' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Enlazar el proyecto
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Aplicar migraciones pendientes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push
