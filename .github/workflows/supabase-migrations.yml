name: Supabase Migrations

# Aplica las migraciones de supabase/migrations/ contra el proyecto de Supabase
# automáticamente al mergear a main. Idempotente: la CLI solo aplica las
# migraciones que aún no están en supabase_migrations.schema_migrations.
#
# Estándar JM Nexus Designs — ver docs/DEPLOY-SUPABASE.md.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch: {} # permite correr el primer despliegue a mano desde la pestaña Actions

# Nunca dos despliegues de migraciones a la vez sobre la misma BD.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  push-migrations:
    name: Aplicar migraciones a Supabase
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar secrets requeridos
        run: |
          missing=0
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && { echo "::error::Falta el secret SUPABASE_ACCESS_TOKEN"; missing=1; }
          [ -z "$SUPABASE_DB_PASSWORD" ]  && { echo "::error::Falta el secret SUPABASE_DB_PASSWORD"; missing=1; }
          [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ] && { echo "::error::Falta el secret SUPABASE_PROJECT_REF"; missing=1; }
          [ "$missing" -ne 0 ] && exit 1
          echo "Secrets presentes."

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Enlazar proyecto
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Aplicar migraciones pendientes
        # db push aplica, en orden y cada una en su propia transacción, solo las
        # migraciones que faltan. Cada archivo en su propia transacción = los
        # cortes de enum (0003→0004, 0008→0009) se respetan automáticamente.
        # Si una migración falla, la CLI imprime el archivo y el error SQL, y el
        # step termina con código ≠ 0 → el workflow falla en rojo.
        run: supabase db push

      - name: Resumen
        if: success()
        run: |
          echo "✅ Migraciones aplicadas."
          echo "Siguiente paso manual: correr el Security Advisor en el dashboard"
          echo "(Advisors → Security) y cerrar cualquier advertencia."
